name: QA Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start demo app
        run: |
          uvicorn demo_app.main:app --host 127.0.0.1 --port 3000 &
          python - <<'PY'
          import time
          import urllib.request

          for _ in range(20):
              try:
                  urllib.request.urlopen("http://127.0.0.1:3000/health", timeout=1)
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Demo app did not become healthy in time")
          PY

      - name: Run API tests
        run: |
          mkdir -p reports
          pytest api-tests/ -v --html=reports/api-report.html --self-contained-html

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/api-report.html

  test-ui:
    name: UI Automation (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxdamage1 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libglib2.0-0 \
            libxcomposite1 \
            libxfixes3 \
            libxrandr2 \
            libgtk-3-0 \
            libwayland-client0

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Start demo app
        run: |
          uvicorn demo_app.main:app --host 127.0.0.1 --port 3000 &
          python - <<'PY'
          import time
          import urllib.request

          for _ in range(20):
              try:
                  urllib.request.urlopen("http://127.0.0.1:3000/health", timeout=1)
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Demo app did not become healthy in time")
          PY

      - name: Run UI tests
        run: |
          mkdir -p reports
          pytest automation/ui/ -v --html=reports/ui-report.html --self-contained-html

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-report
          path: reports/ui-report.html

  test-data-quality:
    name: Data Quality Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data quality tests
        run: |
          mkdir -p reports
          pytest data-quality/ -v --html=reports/data-quality-report.html --self-contained-html

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-quality-report
          path: reports/data-quality-report.html

  test-llm:
    name: LLM Evaluation
    runs-on: ubuntu-latest
    # Roda só quando há OPENAI_API_KEY configurada (evita custos em PRs de fork)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LLM evaluation tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p reports
          pytest llm-tests/eval/ -v -m requires_openai --html=reports/llm-report.html --self-contained-html

      - name: Upload LLM report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llm-evaluation-report
          path: reports/llm-report.html
